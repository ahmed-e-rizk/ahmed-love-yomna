<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Cairo", Arial, sans-serif;
  background: #0d0d0d;
  color: #eee;
  overflow-x: hidden;
  min-height: 100vh;
}

#splash {
  position: fixed;
  inset: 0;
  background: #0d0d0d;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  gap: 16px;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#splash.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.splash-title {
  font-size: 26px;
  color: #ff4d6d;
  font-weight: 700;
  letter-spacing: 1px;
}
.splash-sub {
  font-size: 16px;
  color: #888;
}
.splash-dots {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.splash-dots span {
  width: 8px; height: 8px;
  background: #ff4d6d;
  border-radius: 50%;
  animation: blink 1.2s infinite;
}
.splash-dots span:nth-child(2) { animation-delay: 0.2s; }
.splash-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}

#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

#main {
  position: relative;
  z-index: 1;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 30px 20px;
  animation: fadeUp 1s ease forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  background: rgba(30, 20, 30, 0.85);
  border: 1px solid rgba(255, 77, 109, 0.25);
  padding: 40px 30px;
  border-radius: 28px;
  max-width: 460px;
  width: 100%;
  text-align: center;
  backdrop-filter: blur(12px);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  border-radius: 30px;
  background: linear-gradient(135deg, rgba(255,77,109,0.3), transparent, rgba(255,77,109,0.1));
  z-index: -1;
}

.names {
  font-size: 32px;
  font-weight: 700;
  color: #ff4d6d;
  margin-bottom: 6px;
  text-shadow: 0 0 30px rgba(255,77,109,0.4);
}
.date-label {
  font-size: 15px;
  color: #999;
  margin-bottom: 24px;
}

.countdown-box {
  background: rgba(255, 77, 109, 0.08);
  border: 1px solid rgba(255, 77, 109, 0.2);
  border-radius: 16px;
  padding: 18px 20px;
  margin: 20px 0;
}
.countdown-label {
  font-size: 13px;
  color: #999;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}
.countdown-grid {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}
.time-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 56px;
}
.time-num {
  font-size: 28px;
  font-weight: 700;
  color: #ff4d6d;
  line-height: 1;
}
.time-lbl {
  font-size: 11px;
  color: #777;
  margin-top: 4px;
}
.separator {
  font-size: 24px;
  color: rgba(255,77,109,0.4);
  align-self: flex-start;
  margin-top: 3px;
}

.message-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 16px 20px;
  margin-top: 20px;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.message-text {
  font-size: 17px;
  color: #f0e6ff;
  line-height: 1.6;
  animation: msgFade 0.5s ease;
}
@keyframes msgFade {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-counter {
  font-size: 12px;
  color: #555;
  margin-top: 8px;
}

.heart {
  position: fixed;
  bottom: -30px;
  font-size: 18px;
  pointer-events: none;
  animation: floatUp linear forwards;
  z-index: 0;
}
@keyframes floatUp {
  0%   { transform: translateY(0)     rotate(0deg)   scale(1);   opacity: 0.9; }
  30%  { transform: translateY(-30vh) rotate(15deg)  scale(1.1); opacity: 0.8; }
  60%  { transform: translateY(-60vh) rotate(-10deg) scale(1.2); opacity: 0.5; }
  100% { transform: translateY(-110vh) rotate(20deg) scale(0.8); opacity: 0; }
}

.surprise-btn {
  margin-top: 22px;
  padding: 12px 30px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #ff4d6d, #ff1f4d);

  font-size: 16px;

  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(255,77,109,0.3);

}
.surprise-btn:hover {

}

#surprise {
  position: fixed;

  background: rgba(0,0,0,0.92);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;

.surprise-box {

@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.surprise-box img {
  width: 100%;
  border-radius: 16px;

.surprise-box h2 { color: #ff4d6d; font-size: 24px; margin-bottom: 12px; }
.surprise-box p  { color: #ddd; font-size: 16px; line-height: 1.8; margin-bottom: 18px; }
.close-btn {

  font-size: 16px;
  font-family: "Cairo", sans-serif;

.music-toggle {

  left: 24px;
  width: 44px; height: 44px;

  border: 1px solid rgba(255,77,109,0.3);

  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;

.music-toggle:hover { background: rgba(255,77,109,0.3); }

@media (max-width: 480px) {

/* ===== helper: الوقت الحالي بتوقيت مصر ===== */
function egyptNow() {
  return new Date(new Date().toLocaleString("en-US", { timeZone: "Africa/Cairo" }));
}

/* ===== نجوم الخلفية ===== */
(function() {
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");
  let stars = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.position = "fixed";
    canvas.style.top = "0"; canvas.style.left = "0";
    canvas.style.zIndex = "0";
    canvas.style.pointerEvents = "none";
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.3,
        a: Math.random(),
        spd: Math.random() * 0.5 + 0.2,
        dir: Math.random() > 0.5 ? 1 : -1
      });
    }
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += 0.005 * s.spd * s.dir;
      if (s.a > 1 || s.a < 0) s.dir *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,220,230,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  resize();
  initStars();
  drawStars();
  window.addEventListener("resize", () => { resize(); initStars(); });
})();

/* ===== Splash ===== */
setTimeout(() => {
  document.getElementById("splash").classList.add("hide");
  const main = document.getElementById("main");
  main.style.display = "flex";
  document.getElementById("musicBtn").style.display = "flex";
  updateMsg();
  checkSurpriseBtn();
}, 3200);

/* ===== موسيقى على أول تفاعل ===== */
function startMusicOnce() {
  const mus = document.getElementById("music");
  mus.play().then(() => {
    playing = true;
    document.getElementById("musicBtn").textContent = "⏸️";
  }).catch(() => {});
  document.removeEventListener("click", startMusicOnce);
  document.removeEventListener("touchstart", startMusicOnce);
}
document.addEventListener("click", startMusicOnce);
document.addEventListener("touchstart", startMusicOnce);

/* ===== العداد ===== */
// غيّر الوقت 20:00:00 على حسب ميعاد الفرح الفعلي
const eventDate = new Date("2026-06-26T20:00:00+03:00");

function pad(n) { return String(n).padStart(2, "0"); }

function updateCountdown() {
  const now  = new Date();
  const diff = eventDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML =
      '<div style="color:#ff4d6d;font-size:20px;font-weight:700;">النهارده هو اليوم المنتظر 💍</div>';
    return;
  }

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000)  / 60000);
  const s = Math.floor((diff % 60000)    / 1000);

  document.getElementById("cd-d").textContent = pad(d);
  document.getElementById("cd-h").textContent = pad(h);
  document.getElementById("cd-m").textContent = pad(m);
  document.getElementById("cd-s").textContent = pad(s);
}

setInterval(updateCountdown, 1000);
updateCountdown();

// تاريخ بداية الرسائل بتوقيت مصر
const startDate = new Date("2026-04-08T00:00:00+03:00");
let currentMsgIndex = 0;

function updateMsg() {
  const eg = egyptNow();

  // يوم النهارده بتوقيت مصر (بدون ساعات)
  const todayEgypt = new Date(eg.getFullYear(), eg.getMonth(), eg.getDate());

  // يوم البداية بتوقيت مصر (بدون ساعات)
  const startEgypt = new Date(
    new Date(startDate.toLocaleString("en-US", { timeZone: "Africa/Cairo" }))
  );
  startEgypt.setHours(0, 0, 0, 0);

  const dayDiff = Math.floor((todayEgypt - startEgypt) / 86400000);
  currentMsgIndex = Math.abs(dayDiff) % messages.length;

  const el = document.getElementById("msg");
  el.style.animation = "none";
  el.offsetHeight;
  el.style.animation = "msgFade 0.5s ease";
  el.textContent = messages[currentMsgIndex];
  document.getElementById("msg-counter").textContent =
    `رسالة ${currentMsgIndex + 1} من ${messages.length} 💌`;
}

// تحديث الرسالة كل ساعة
setInterval(updateMsg, 3600000);

/* ===== قلوب عائمة ===== */
const hearts = ["❤️","🩷","💕","💗","💞","💖","🌹","✨"];

function spawnHeart() {
  const h = document.createElement("div");
  h.className = "heart";
  h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  h.style.left = (Math.random() * 95) + "vw";
  h.style.fontSize = (14 + Math.random() * 10) + "px";
  const dur = 4 + Math.random() * 3;
  h.style.animationDuration = dur + "s";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), dur * 1000);
}
setInterval(spawnHeart, 1800);

/* ===== الموسيقى ===== */
let playing = false;
function toggleMusic() {
  const mus = document.getElementById("music");
  const btn = document.getElementById("musicBtn");
  if (playing) { mus.pause(); btn.textContent = "🎵"; playing = false; }
  else         { mus.play().catch(()=>{}); btn.textContent = "⏸️"; playing = true; }
}

/* ===== المفاجأة — تظهر يوم 26 يونيو بتوقيت مصر ===== */
function checkSurpriseBtn() {
  const eg = egyptNow();
  if (eg.getDate() === 26 && eg.getMonth() === 5 && eg.getFullYear() === 2026) {
    document.getElementById("surpriseBtn").style.display = "inline-block";
  }
}

function openSurprise()  { document.getElementById("surprise").style.display = "flex"; }
function closeSurprise() { document.getElementById("surprise").style.display = "none"; }

setInterval(checkSurpriseBtn, 10000);
</script>
