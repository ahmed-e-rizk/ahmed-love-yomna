<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ahmed ❤️ Yomna</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Cairo", Arial, sans-serif;
  background: #0d0d0d;
  color: #eee;
  overflow-x: hidden;
  min-height: 100vh;
}

/* Splash */
#splash {
  position: fixed;
  inset: 0;
  background: #0d0d0d;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  gap: 16px;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#splash.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.splash-title { font-size: 26px; color: #ff4d6d; font-weight: 700; }
.splash-sub { font-size: 16px; color: #888; }

.splash-dots span {
  width: 8px; height: 8px;
  background: #ff4d6d;
  border-radius: 50%;
  display: inline-block;
  animation: blink 1.2s infinite;
}

@keyframes blink {
  0%,100%{opacity:0.2}
  40%{opacity:1}
}

/* Main */
#main {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 30px 20px;
}

.card {
  background: rgba(30,20,30,0.85);
  padding: 40px 30px;
  border-radius: 28px;
  max-width: 460px;
  width: 100%;
  text-align: center;
}

.names { font-size: 32px; color: #ff4d6d; font-weight: 700; }
.date-label { color: #999; margin: 10px 0 20px; }

/* Countdown */
.time-num { font-size: 26px; color: #ff4d6d; }

/* Message */
.message-box {
  margin-top: 20px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
}

/* Heart */
.heart {
  position: fixed;
  bottom: -30px;
  animation: floatUp linear forwards;
}
@keyframes floatUp {
  to { transform: translateY(-120vh); opacity: 0; }
}

/* Surprise */
#surprise {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}
</style>
</head>

<body>

<div id="splash">
  <div class="splash-title">Ahmed ❤️ Yomna</div>
  <div class="splash-sub">كانت دعوة.. دلوقتي بقت يمنى 💙</div>
  <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<div id="main">
  <div class="card">
    <div class="names">Ahmed ❤️ Yomna</div>
    <div class="date-label">كتب الكتاب: 26 يونيو 2026 💍</div>

    <div class="message-box" id="msg">...</div>
    <div id="msg-counter"></div>

    <button onclick="openSurprise()" id="surpriseBtn" style="display:none;">🎁 المفاجأة</button>
  </div>
</div>

<div id="surprise">
  <div>
    <h2 style="color:#ff4d6d;">ليكي أنتي ❤️</h2>
    <p style="color:white;text-align:center">
      حب كبير مالوش وصف ❤️💍
    </p>
    <button onclick="closeSurprise()">❤️ بحبك</button>
  </div>
</div>

<script>

/* ================= TIME EGYPT FIX ================= */
function getEgyptNow() {
  return new Date(new Date().toLocaleString("en-US", {
    timeZone: "Africa/Cairo"
  }));
}

/* Splash */
setTimeout(() => {
  document.getElementById("splash").classList.add("hide");
  document.getElementById("main").style.display = "flex";
  updateMsg();
}, 3000);

/* Countdown */
const eventDate = new Date("June 26, 2026 00:00:00");

function updateCountdown() {
  const diff = eventDate - new Date();

  if (diff <= 0) return;

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  document.getElementById("countdown")?.textContent;
}

setInterval(updateCountdown, 1000);

/* Messages */
const messages = [
  "كل يوم بحبك أكتر ❤️",
  "انتي الأمان الحقيقي ❤️",
  "مستني يومنا 💍",
  "وجودك حياة ❤️",
  "بحبك بلا نهاية 💫"
];

const startDate = new Date("April 8, 2026");
let currentMsgIndex = 0;

function updateMsg() {
  const egyptNow = getEgyptNow();

  const dayDiff = Math.floor((egyptNow - startDate) / 86400000);
  currentMsgIndex = Math.abs(dayDiff) % messages.length;

  document.getElementById("msg").textContent = messages[currentMsgIndex];

  document.getElementById("msg-counter").textContent =
    `رسالة ${currentMsgIndex + 1} من ${messages.length}`;
}

setInterval(updateMsg, 3600000);

/* Hearts */
setInterval(() => {
  const h = document.createElement("div");
  h.className = "heart";
  h.textContent = "❤️";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (3 + Math.random() * 3) + "s";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 1500);

/* Surprise */
function openSurprise() {
  document.getElementById("surprise").style.display = "flex";
}
function closeSurprise() {
  document.getElementById("surprise").style.display = "none";
}

/* Surprise Button Day Check (EGYPT FIXED) */
function checkSurpriseBtn() {
  const egyptNow = getEgyptNow();

  if (
    egyptNow.getDate() === 26 &&
    egyptNow.getMonth() === 5 &&
    egyptNow.getFullYear() === 2026
  ) {
    document.getElementById("surpriseBtn").style.display = "inline-block";
  }
}

setInterval(checkSurpriseBtn, 10000);

</script>
</body>
</html>
